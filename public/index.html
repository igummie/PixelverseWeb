<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixelverse pre-pre</title>
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <section id="mainScreen" class="screen active">
      <div class="panel">
        <div class="title">Pixelverse pre-preview</div>
        <div class="subtitle">Build, break, and hang out in shared worlds.</div>
        <button id="playBtn">Play</button>
      </div>
    </section>

    <section id="loginScreen" class="screen">
      <div class="panel">
        <div class="title" style="text-align: center">Login</div>
        <!-- <div class="subtitle">Use an account to enter multiplayer worlds.</div> -->
        <input id="usernameInput" placeholder="Username" maxlength="16" />
        <input id="passwordInput" placeholder="Password" type="password" maxlength="72" />
        <div class="row">
          <button id="loginBtn">Login</button>
          <button id="registerBtn">Register</button>
        </div>
        <button id="guestBtn">Continue as Guest</button>
        <button id="backToMainBtn">Back</button>
        <div id="loginError" class="error"></div>
      </div>
    </section>

    <section id="loadingScreen" class="screen">
      <div id="loadingChatOverlayRegion" class="chatOverlayRegion worldChatOverlayRegion">
        <div id="loadingChatDrawer" class="chatDrawer">
          <div id="loadingChatDrawerHandle" class="chatDrawerHandle" title="Drag loading drawer"></div>
          <div class="chatLogPanel">
            <div id="loadingChatLog" class="chatLog"></div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="title">Loading</div>
        <div id="loadingStatus" class="subtitle">Preparing assets...</div>
      </div>
    </section>

    <section id="worldScreen" class="screen">
      <div id="worldChatOverlayRegion" class="chatOverlayRegion worldChatOverlayRegion">
        <div id="worldChatDrawer" class="chatDrawer">
          <div id="worldChatDrawerHandle" class="chatDrawerHandle" title="Drag history drawer"></div>
          <div class="chatLogPanel">
            <div id="worldChatLog" class="chatLog"></div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="title">World Selection</div>
        <div id="welcomeText" class="subtitle"></div>
        <div id="worldList"></div>
        <input id="worldInput" placeholder="Enter world name" maxlength="24" value="start" />
        <div class="row">
          <button id="joinWorldBtn">Enter World</button>
          <button id="refreshWorldsBtn">Refresh</button>
        </div>
        <a class="buttonLink" href="/texture47-editor.html" target="_blank" rel="noopener">Pixelverse Texture Tool</a>
        <button id="logoutBtn">Logout</button>
        <div id="worldError" class="error"></div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div id="gameHud">
        <div class="gameTopbar">
          <div id="gameStatus">Connecting...</div>
          <div id="gemCount" style="font-size: 12px; opacity: 0.95; min-width: 88px">Gems: 0</div>
          <label for="blockSelect">Block:</label>
          <select id="blockSelect"></select>
          <div id="blockTypeInfo" style="font-size: 12px; opacity: 0.8"></div>
          <button id="zoomOutBtn" type="button">-</button>
          <div id="zoomLevel" style="font-size: 12px; opacity: 0.9; min-width: 66px; text-align: center">Zoom 1.00x</div>
          <button id="zoomInBtn" type="button">+</button>
          <button id="zoomResetBtn" type="button">1x</button>
          <button id="chatToggleBtn" type="button">Chat</button>
          <button id="debugToggleBtn" type="button">Debug</button>
          <div class="spacer">LMB: break | RMB: place | WASD/Arrows: move | Enter: chat | ESC: leave</div>
          <button id="leaveWorldBtn">Leave World</button>
        </div>
        </div>
        <div id="debugOverlay" class="debugOverlay hidden">
          <div class="debugHead">
            <strong>Debug</strong>
            <label class="debugGridToggle" for="debugGridToggle">
              <input id="debugGridToggle" type="checkbox" />
              Grid
            </label>
          </div>
          <pre id="debugInfo" class="debugInfo"></pre>
        </div>
        <div id="chatOverlayRegion" class="chatOverlayRegion">
          <div id="chatDrawer" class="chatDrawer">
            <div id="chatDrawerHandle" class="chatDrawerHandle" title="Drag chat drawer"></div>
            <div id="chatLogPanel" class="chatLogPanel">
              <div id="chatLog" class="chatLog"></div>
            </div>
            <div id="chatInputPanel" class="chatInputPanel hidden">
              <input id="chatInput" maxlength="160" placeholder="Type message and press Enter..." />
          </div>
        </div>
      </div>
      <canvas id="game"></canvas>
    </section>

    <script src="/build/game.bundle.js"></script>
  </body>
</html>
